# ─────────────────────────────────────────────
# IRIS Enrichment Module — Configuration File
# Edit this file to configure for your environment.
# NEVER commit real API keys to version control.
# ─────────────────────────────────────────────

iris:
  url: https://localhost:443
  api_key: YOUR_IRIS_API_TOKEN_HERE
  verify_ssl: false

feeds:

  abuseipdb:
    enabled: true
    api_key: YOUR_ABUSEIPDB_KEY_HERE
    max_age_days: 90
    timeout_seconds: 10

  virustotal:
    enabled: true
    api_key: YOUR_VIRUSTOTAL_KEY_HERE
    timeout_seconds: 15

  urlhaus:
    enabled: true
    api_key: null
    timeout_seconds: 10

  malwarebazaar:
    enabled: true
    api_key: null
    timeout_seconds: 10

  emailrep:
    enabled: true
    api_key: YOUR_EMAILREP_KEY_HERE
    timeout_seconds: 10

  nvd:
    enabled: true
    api_key: null
    timeout_seconds: 15

  misp:
    enabled: false
    url: https://misp.internal
    api_key: YOUR_MISP_KEY_HERE
    verify_ssl: true
    timeout_seconds: 10

verdicts:
  malicious_threshold: 80
  suspicious_threshold: 60

cache:
  enabled: true
  ttl_seconds: 86400

retry:
  max_attempts: 2
  retry_delay_seconds: 10

logging:
  level: INFO